<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光伏储能配置系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>零碳园区能源系统</h1>
            <a href="/dashboard" class="dashboard-link">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                    <path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/>
                </svg>
                监控大屏
            </a>
        </header>

        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="chart">功率曲线图</button>
            <button class="tab-btn" data-tab="config">设备配置</button>
            <button class="tab-btn" data-tab="optimization">优化算法</button>
        </nav>

        <div class="tab-content">
            <div id="tab-chart" class="tab-pane active">
                <div class="chart-sub-tabs">
                    <button class="chart-sub-tab-btn active" data-chart-sub-tab="park">园区总功率曲线</button>
                    <button class="chart-sub-tab-btn" data-chart-sub-tab="community">分园区功率曲线</button>
                </div>
                <div id="chart-sub-tab-park" class="chart-sub-tab-content active">
                    <div class="optimization-charts">
                        <div class="chart-section full-width">
                            <div id="park-power-chart" class="chart-container"></div>
                        </div>
                    </div>
                </div>
                <div id="chart-sub-tab-community" class="chart-sub-tab-content">
                    <div class="optimization-charts">
                        <div class="chart-section full-width">
                            <h3>各社区功率曲线</h3>
                            <div class="scenario-selector">
                                <label>选择场景：</label>
                                <select id="chart-community-scenario-select" onchange="loadChartCommunityPower()">
                                    <option value="S1">S1: 无储能无碳交易</option>
                                    <option value="S2">S2: 有储能无碳交易</option>
                                    <option value="S3" selected>S3: 有储能有碳交易</option>
                                    <option value="S4">S4: 高新能源有储能有碳交易</option>
                                </select>
                                <label style="margin-left: 20px;">选择社区：</label>
                                <select id="chart-community-id-select" onchange="loadChartCommunityPower()">
                                    <option value="1">工业区</option>
                                    <option value="2">商业区</option>
                                    <option value="3">居民区</option>
                                </select>
                            </div>
                            <div id="chart-community-power-chart" class="chart-container"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-config" class="tab-pane">
                <div class="config-sub-tabs">
                    <button class="config-sub-tab-btn active" data-config-sub-tab="panel">光伏配置</button>
                    <button class="config-sub-tab-btn" data-config-sub-tab="wind">风电配置</button>
                    <button class="config-sub-tab-btn" data-config-sub-tab="storage">储能配置</button>
                </div>
                <div id="config-sub-tab-panel" class="config-sub-tab-content active">
                    <div class="config-page">
                        <div class="config-header">
                            <h2>光伏配置管理</h2>
                            <p class="config-hint">支持同时配置多种光伏板，系统会自动计算总功率</p>
                        </div>
                        <div class="panel-quantities-section">
                            <h3>社区选择</h3>
                            <div class="config-select-row">
                                <label>当前社区:</label>
                                <select id="community-select" onchange="switchCommunity()"></select>
                            </div>
                            <h3>光伏板数量配置</h3>
                            <div id="panel-quantities-list" class="panel-quantities-list">
                            </div>
                            <div class="form-actions">
                                <button onclick="savePanelQuantities()" class="btn-primary">保存数量配置</button>
                            </div>
                        </div>
                        <div class="panel-curve-section">
                            <h3>社区光伏发电曲线</h3>
                            <div class="scenario-selector">
                                <label>天气类型：</label>
                                <div id="solar-curve-legend" class="curve-legend"></div>
                            </div>
                            <div id="community-solar-curve-chart" class="chart-container" style="min-height:300px;"></div>
                        </div>
                        <div class="panel-details-section">
                            <h3>光伏板详细配置</h3>
                            <div class="config-select-row">
                                <label>选择光伏板:</label>
                                <select id="panel-select" onchange="loadPanelDetail()"></select>
                                <button onclick="showCreatePanelModal()" class="btn-small">新建</button>
                                <button onclick="deleteCurrentPanel()" class="btn-small btn-danger">删除</button>
                            </div>
                            <div id="panel-detail-form" class="config-form" style="display: none;">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>面积 (m²):</label>
                                        <input type="number" id="panel-area" step="1">
                                    </div>
                                    <div class="form-group">
                                        <label>倾角 (°):</label>
                                        <input type="number" id="panel-tilt" step="1" min="0" max="90">
                                    </div>
                                    <div class="form-group">
                                        <label>方位角 (°):</label>
                                        <input type="number" id="panel-azimuth" step="1" min="0" max="360">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>纬度:</label>
                                        <input type="number" id="panel-lat" step="0.1">
                                    </div>
                                    <div class="form-group">
                                        <label>经度:</label>
                                        <input type="number" id="panel-lon" step="0.1">
                                    </div>
                                    <div class="form-group">
                                        <label>海拔 (m):</label>
                                        <input type="number" id="panel-altitude" step="1">
                                    </div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label>环境温度 (°C):</label>
                                        <input type="number" id="panel-temp-air" step="1">
                                    </div>
                                    <div class="form-group">
                                        <label>风速 (m/s):</label>
                                        <input type="number" id="panel-wind-speed" step="0.1">
                                    </div>
                                </div>
                                <div class="form-actions">
                                    <button onclick="updatePanelConfig()" class="btn-primary">保存光伏板配置</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="config-sub-tab-wind" class="config-sub-tab-content">
                    <div class="config-page">
                        <div class="config-header">
                            <h2>风电配置管理</h2>
                            <p class="config-hint">配置各社区的风力发电机台数</p>
                        </div>
                        <div class="config-select-row">
                            <label>风电社区:</label>
                            <select id="wind-community-select" onchange="switchWindCommunity()"></select>
                        </div>
                        <div class="config-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>风机台数:</label>
                                    <input type="number" id="wind-turbine-count" step="1" min="0">
                                </div>
                            </div>
                            <div class="form-actions">
                                <button onclick="saveWindTurbineCount()" class="btn-primary">保存风机台数</button>
                            </div>
                        </div>
                        <div class="panel-curve-section">
                            <h3>社区风力发电曲线</h3>
                            <div id="community-wind-curve-chart" class="chart-container" style="min-height:300px;"></div>
                        </div>
                        <div class="panel-details-section" style="margin-top: 24px;">
                            <h3>风机参数</h3>
                            <div id="wind-turbine-detail" class="config-form">
                            </div>
                        </div>
                    </div>
                </div>
                <div id="config-sub-tab-storage" class="config-sub-tab-content">
                    <div class="config-page">
                        <div class="config-header">
                            <h2>储能配置管理</h2>
                        </div>
                        <div class="config-select-row">
                            <label>当前配置:</label>
                            <select id="storage-select"></select>
                            <button onclick="switchStorage()" class="btn-small">切换</button>
                            <button onclick="showCreateStorageModal()" class="btn-small">新建</button>
                            <button onclick="deleteCurrentStorage()" class="btn-small btn-danger">删除</button>
                        </div>
                        <div class="config-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>容量 (kWh):</label>
                                    <input type="number" id="storage-capacity" step="1">
                                </div>
                                <div class="form-group">
                                    <label>最大充电功率 (kW):</label>
                                    <input type="number" id="storage-charge-power" step="1">
                                </div>
                                <div class="form-group">
                                    <label>最大放电功率 (kW):</label>
                                    <input type="number" id="storage-discharge-power" step="1">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>充电效率:</label>
                                    <input type="number" id="storage-charge-eff" step="0.01" min="0" max="1">
                                </div>
                                <div class="form-group">
                                    <label>放电效率:</label>
                                    <input type="number" id="storage-discharge-eff" step="0.01" min="0" max="1">
                                </div>
                                <div class="form-group">
                                    <label>初始 SOC:</label>
                                    <input type="number" id="storage-initial-soc" step="0.01" min="0" max="1">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>最小 SOC:</label>
                                    <input type="number" id="storage-min-soc" step="0.01" min="0" max="1">
                                </div>
                                <div class="form-group">
                                    <label>最大 SOC:</label>
                                    <input type="number" id="storage-max-soc" step="0.01" min="0" max="1">
                                </div>
                            </div>
                            <div class="form-actions">
                                <button onclick="updateStorageConfig()" class="btn-primary">保存储能配置</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-optimization" class="tab-pane">
                <div class="optimization-page">
                    <div class="config-header">
                        <h2>零碳园区优化结果分析</h2>
                        <p class="config-hint">基于典型气象日的多能互补系统优化结果</p>
                    </div>
                    
                    <div class="optimization-sub-tabs">
                        <button class="sub-tab-btn active" data-sub-tab="typical">全园区数据汇总</button>
                        <button class="sub-tab-btn" data-sub-tab="convergence">收敛曲线</button>
                    </div>
                    
                    <div id="sub-tab-typical" class="sub-tab-content active">
                        <div class="optimization-charts">
                            <div class="chart-section">
                                <h3>经济性对比</h3>
                                <div id="economic-chart" class="chart-container"></div>
                            </div>
                            <div class="chart-section">
                                <h3>可再生能源利用</h3>
                                <div id="renewable-chart" class="chart-container"></div>
                            </div>
                            <div class="chart-section">
                                <h3>碳排放分析</h3>
                                <div id="carbon-chart" class="chart-container"></div>
                            </div>
                        </div>
                        
                        <div class="optimization-summary">
                            <h3>年度汇总指标</h3>
                            <div id="annual-summary" class="summary-cards"></div>
                        </div>
                        
                        <div class="optimization-details">
                            <h3>典型场景详细数据</h3>
                            <div id="scenarios-table" class="data-table-container"></div>
                        </div>
                    </div>
                    
                    <div id="sub-tab-convergence" class="sub-tab-content">
                        <div class="convergence-intro">
                            <h3>ADMM算法收敛曲线</h3>
                            <p style="color: #7f8c8d; margin-bottom: 20px;">
                                展示四种场景下ADMM分布式优化算法的收敛过程。原始残差和对偶残差随迭代次数下降，验证算法收敛性。
                            </p>
                        </div>
                        <div class="optimization-charts">
                            <div class="chart-section full-width">
                                <div id="admm-convergence-chart" class="chart-container"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-overlay" class="modal-overlay">
        <div class="modal">
            <h3 id="modal-title">新建配置</h3>
            <div id="modal-content"></div>
            <div class="modal-actions">
                <button onclick="closeModal()" class="btn-small">取消</button>
                <button onclick="confirmModal()" class="btn-primary">确认</button>
            </div>
        </div>
    </div>

    <div id="loading" class="loading">
        <div class="loading-spinner"></div>
        <span>计算中...</span>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
